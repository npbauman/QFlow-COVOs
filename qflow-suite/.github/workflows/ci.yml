name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install lint tools
        run: pip install ruff

      - name: Lint with ruff (excludes vendored algorithm_sd.py / algorithm_sdtq.py; see pyproject.toml)
        run: ruff check src/

      - name: Verify package imports cleanly (including vendored algorithm modules)
        run: |
          python -c "import qflow_suite; from qflow_suite import cli, common, algorithm_sd, algorithm_sdtq; print('qflow_suite imported OK, version', qflow_suite.__version__)"

      - name: Verify CLI entry point is installed
        run: |
          qflow-suite --help
          qflow-suite run --help
