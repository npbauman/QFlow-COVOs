name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install lint tools
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/

      - name: Verify package imports cleanly
        run: |
          python -c "import covo_ci; from covo_ci import cli, extract, io_aperiodic, io_periodic, strings, spin, solver, hamiltonian_aperiodic, hamiltonian_periodic; print('covo_ci imported OK, version', covo_ci.__version__)"

      - name: Verify CLI entry point is installed
        run: |
          covo-ci --help
          covo-ci run --help
          covo-ci extract --help
